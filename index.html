<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIMIGO GD FORUM</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --accent-pink: #ed0d92; /* 요청하신 메인 색상 */
            --text-main: #eeeeee;
            --text-dim: #aaaaaa;
            --border: #2a2a2a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        header {
            height: 60px;
            border-bottom: 2px solid var(--accent-pink);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo { font-weight: 900; letter-spacing: -1px; font-size: 1.4rem; color: var(--accent-pink); text-shadow: 0 0 10px rgba(237, 13, 146, 0.3); }

        .login-btn {
            background: var(--accent-pink);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.8; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        .hero { margin-bottom: 40px; border-left: 5px solid var(--accent-pink); padding-left: 20px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; color: #fff; }
        .hero p { color: var(--text-dim); max-width: 700px; }

        .main-layout { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; }

        .list-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .list-header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; background: #1f1f1f; color: var(--accent-pink); }

        .demon-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .demon-item:hover { background: #222; padding-left: 20px; }
        .rank { width: 85px; font-weight: 800; color: var(--text-dim); font-size: 0.75rem; }
        .level-info .name { font-weight: 700; display: block; color: #fff; }
        .level-info .author { font-size: 0.8rem; color: var(--text-dim); }

        /* About 페이지 전용 스타일 */
        .about-section { padding: 30px; }
        .about-section img { width: 100%; border-radius: 8px; margin-bottom: 25px; border: 1px solid var(--accent-pink); box-shadow: 0 0 15px rgba(237, 13, 146, 0.2); }
        .about-section h2 { color: var(--accent-pink); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 30px; }
        .about-section ul { padding-left: 20px; color: var(--text-dim); }
        .about-section li { margin-bottom: 10px; }
        .about-section strong { color: #fff; }

        .submit-form { background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-dim); }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: white; box-sizing: border-box; border-radius: 4px; }
        input:focus { border-color: var(--accent-pink); outline: none; }
        .submit-btn { width: 100%; padding: 12px; background: var(--accent-pink); color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; transition: transform 0.1s; }
        .submit-btn:active { transform: scale(0.98); }

        .loading { padding: 50px; text-align: center; color: var(--accent-pink); font-weight: bold; }
        .tier-divider { padding: 12px 15px; background: #1a1a1a; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body onload="loadAboutGD()">

<header>
    <div class="logo">DIMIGO GD LIST</div>
    <a href="#" class="login-btn">Google 로그인</a>
</header>

<div class="container">
    <section class="hero">
        <h1>DIMIGO GD FORUM</h1>
        <p>디미고 지메 고수들을 위한 실시간 랭킹 포럼. GDDP와 AREDL 데이터를 기반으로 운영됨.</p>
    </section>

    <div class="main-layout">
        <aside>
            <div class="list-box">
                <div class="demon-item" style="color: #fff;" onclick="loadAboutGD()">📌 About GD</div>
            </div>
            <br>
            <div class="list-box">
                <div class="list-header">NAVIGATION</div>
                <div class="demon-item" style="color: #5ec6ff;" onclick="loadGDDPList()">💠 GDDP (Easy~Insane)</div>
                <div class="demon-item" style="color: #ff4d4d;" onclick="loadExtremeList()">🔥 Extreme (AREDL)</div>
            </div>
            <br>
            <div class="list-box">
                <div class="demon-item" onclick="alert('매점 포인트 가이드:\n이지: 100P\n노멀: 500P\n하드: 1,000P\n인세인: 10,000P\n익스트림: 100,000P')">🛒 매점 포인트 안내</div>
            </div>
        </aside>

        <main id="main-content">
            <div class="list-box">
                <div class="list-header" id="list-title">...</div>
                <div id="list-container"></div>
            </div>
        </main>

        <aside>
            <div class="submit-form">
                <div style="font-weight: bold; margin-bottom: 20px; color: var(--accent-pink);">RECORD SUBMIT</div>
                <div class="form-group">
                    <label>Level Name</label>
                    <input type="text" id="levelName" placeholder="예: Bloodbath">
                </div>
                <div class="form-group">
                    <label>Progress (%)</label>
                    <input type="number" id="percent" placeholder="100">
                </div>
                <div class="form-group">
                    <label>Video Link</label>
                    <input type="url" id="videoLink" placeholder="YouTube Link">
                </div>
                <button class="submit-btn" onclick="submitRecord()">제출하기</button>
            </div>
        </aside>
    </div>
</div>

<script>
    const GDDP_DATA_URL = 'https://raw.githubusercontent.com/Alex1304/gddp/master/data/levels.json';

    // 1. About GD (나무위키 기반 + 이미지)
    function loadAboutGD() {
        const container = document.getElementById('list-container');
        const title = document.getElementById('list-title');
        title.innerText = "About Geometry Dash";

        container.innerHTML = `
            <div class="about-section">
                <img src="image_b0ac51.jpg" alt="Geometry Dash Banner">
                <h2>1. 개요</h2>
                <p><strong>Geometry Dash</strong>는 스웨덴의 개발자 RobTop이 제작한 리듬 기반 플랫폼 게임입니다. 단순한 조작으로 극한의 난이도를 돌파하는 쾌감을 제공하며, 전 세계 유저들이 만든 수천만 개의 레벨을 즐길 수 있는 것이 큰 특징입니다.</p>
                
                <h2>2. 주요 특징</h2>
                <ul>
                    <li><strong>One-Button Control:</strong> 클릭 한 번으로 점프, 비행, 중력 반전 등 모든 동작이 가능합니다.</li>
                    <li><strong>커스텀 에디터:</strong> 유저가 직접 맵을 디자인하고 음악을 연동하여 전 세계에 공유할 수 있습니다.</li>
                    <li><strong>다양한 기믹:</strong> 큐브, 쉽, 볼, UFO, 웨이브, 로봇, 스파이더 등 고유한 물리 법칙을 가진 모드들이 존재합니다.</li>
                </ul>

                <h2>3. 데몬(Demon) 시스템</h2>
                <p>일반 난이도를 뛰어넘는 어려운 레벨들을 '데몬'이라 부르며, 본 포럼은 이를 세분화하여 기록을 관리합니다.</p>

                <div style="background: #1a1a1a; padding: 20px; border-radius: 8px; margin-top: 30px; border: 1px solid var(--accent-pink);">
                    <h3 style="margin: 0 0 10px 0; color: var(--accent-pink);">⚠️ 등재 가이드라인</h3>
                    <p style="margin: 0; font-size: 0.9rem; color: #bbb;">
                        - 모든 기록은 반드시 본인의 <strong>유튜브 플레이 영상</strong>을 제출해야 합니다.<br>
                        - 핵, 매크로, 대리 플레이 적발 시 사이트 이용이 영구 제한됩니다.
                    </p>
                </div>
            </div>
        `;
    }

    // 2. GDDP 리스트
    async function loadGDDPList() {
        const container = document.getElementById('list-container');
        const title = document.getElementById('list-title');
        title.innerText = "GDDP Official List";
        container.innerHTML = '<div class="loading">GDDP API 데이터를 불러오는 중...</div>';

        try {
            const response = await fetch(GDDP_DATA_URL);
            const allData = await response.json();
            const targetTiers = ['beginner', 'bronze', 'silver', 'gold'];
            let html = '';

            targetTiers.forEach(tier => {
                const tierColor = {'beginner': '#5ec6ff', 'bronze': '#cd7f32', 'silver': '#c0c0c0', 'gold': '#ffd700'}[tier];
                html += `<div class="tier-divider" style="border-left: 5px solid ${tierColor}; color: ${tierColor};">
                            <span>${tier.toUpperCase()} TIER</span>
                            <span style="font-size: 0.7rem; opacity: 0.6;">${allData[tier].length} Levels</span>
                         </div>`;
                allData[tier].forEach(level => {
                    html += `
                        <div class="demon-item" onclick="window.open('https://youtube.com/results?search_query=GD+${level.name}+by+${level.author}', '_blank')">
                            <span class="rank" style="color:#555">ID: ${level.id}</span>
                            <div class="level-info">
                                <span class="name">${level.name}</span>
                                <span class="author">by ${level.author}</span>
                            </div>
                        </div>`;
                });
            });
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = '<div class="loading" style="color:red">에러 발생: Live Server로 실행 중인지 확인하세요!</div>';
        }
    }

    // 3. AREDL 리스트
    async function loadExtremeList() {
        const container = document.getElementById('list-container');
        const title = document.getElementById('list-title');
        title.innerText = "AREDL Extreme Demon List";
        container.innerHTML = '<div class="loading">AREDL 실시간 랭킹 로딩 중...</div>';

        try {
            const response = await fetch('https://api.aredl.net/api/levels');
            const data = await response.json();
            let html = '';
            data.slice(0, 100).forEach((level, index) => {
                html += `
                    <div class="demon-item" onclick="window.open('https://youtube.com/results?search_query=GD+${level.name}+by+${level.publisher}', '_blank')">
                        <span class="rank" style="color: var(--accent-pink)">#${index + 1}</span>
                        <div class="level-info">
                            <span class="name">${level.name}</span>
                            <span class="author">by ${level.publisher}</span>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = '<div class="loading" style="color:red">AREDL 데이터 로드 실패!</div>';
        }
    }

    function submitRecord() {
        const name = document.getElementById('levelName').value;
        if(!name) { alert('레벨 이름을 입력해주세요!'); return; }
        alert(name + ' 기록이 제출되었습니다. 관리자 검토 후 등재됩니다.');
    }
</script>
</body>
</html>
