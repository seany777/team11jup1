<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIMIGO GD FORUM</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --accent-pink: #ed0d92;
            --text-main: #eeeeee;
            --text-dim: #aaaaaa;
            --border: #2a2a2a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        header {
            height: 60px;
            border-bottom: 2px solid var(--accent-pink);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo { font-weight: 900; letter-spacing: -1px; font-size: 1.4rem; color: var(--accent-pink); text-shadow: 0 0 10px rgba(237, 13, 146, 0.3); }

        /* ── 로그인 전: 버튼 ── */
        .login-btn {
            background: var(--accent-pink);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.8; }

        /* ── 로그인 후: 프로필 영역 ── */
        .user-area {
            display: none;          /* 로그인 전엔 숨김 */
            align-items: center;
            gap: 10px;
        }
        .user-area img {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 2px solid var(--accent-pink);
        }
        .user-name { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
        .logout-btn {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover { border-color: var(--accent-pink); color: var(--accent-pink); }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        .hero { margin-bottom: 40px; border-left: 5px solid var(--accent-pink); padding-left: 20px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; color: #fff; }
        .hero p { color: var(--text-dim); max-width: 700px; }

        .main-layout { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; }

        .list-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .list-header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; background: #1f1f1f; color: var(--accent-pink); }

        .demon-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .demon-item:hover { background: #222; padding-left: 20px; }
        .rank { width: 85px; font-weight: 800; color: var(--text-dim); font-size: 0.75rem; }
        .level-info .name { font-weight: 700; display: block; color: #fff; }
        .level-info .author { font-size: 0.8rem; color: var(--text-dim); }

        .about-section { padding: 30px; }
        .about-section img { width: 100%; border-radius: 8px; margin-bottom: 25px; border: 1px solid var(--accent-pink); box-shadow: 0 0 15px rgba(237, 13, 146, 0.2); }
        .about-section h2 { color: var(--accent-pink); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 30px; }
        .about-section ul { padding-left: 20px; color: var(--text-dim); }
        .about-section li { margin-bottom: 10px; }

        .submit-form { background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-dim); }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: white; box-sizing: border-box; border-radius: 4px; }
        input:focus { border-color: var(--accent-pink); outline: none; }
        .submit-btn { width: 100%; padding: 12px; background: var(--accent-pink); color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }

        .tier-divider { padding: 12px 15px; background: #1a1a1a; font-weight: bold; border-bottom: 1px solid var(--border); }

        /* ── 토스트 알림 ── */
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: #1f1f1f; border: 1px solid var(--accent-pink);
            color: var(--text-main); padding: 14px 20px;
            border-radius: 8px; font-size: 0.9rem;
            box-shadow: 0 4px 20px rgba(237,13,146,0.3);
            opacity: 0; transform: translateY(10px);
            transition: all 0.3s; pointer-events: none;
            z-index: 999;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body onload="loadAboutGD()">

<!-- ★ 새 Google Identity Services 라이브러리 -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<header>
    <div class="logo">DIMIGO GD LIST</div>

    <!-- 로그인 전 -->
    <button class="login-btn" id="loginBtn" onclick="startGoogleLogin()">Google 로그인</button>

    <!-- 로그인 후 -->
    <div class="user-area" id="userArea">
        <img id="userPhoto" src="" alt="프로필">
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" onclick="signOut()">로그아웃</button>
    </div>
</header>

<div class="container">
    <section class="hero">
        <h1>DIMIGO GD FORUM</h1>
        <p>디미고 지메 고수들을 위한 리스트. (Offline 고정 데이터 연동 중)</p>
    </section>

    <div class="main-layout">
        <aside>
            <div class="list-box">
                <div class="demon-item" style="color: #fff; font-weight: bold;" onclick="loadAboutGD()">📌 About GD</div>
            </div>
            <br>
            <div class="list-box">
                <div class="list-header">NAVIGATION</div>
                <div class="demon-item" style="color: #5ec6ff;" onclick="loadGDDPList()">💠 GDDP (Easy~Insane)</div>
                <div class="demon-item" style="color: #ff4d4d;" onclick="loadExtremeList()">🔥 Extreme (AREDL)</div>
            </div>
            <br>
            <div class="list-box">
                <div class="demon-item" onclick="alert('매점 포인트 가이드:\n이지: 100P\n노멀: 500P\n하드: 1,000P\n인세인: 10,000P\n익스트림: 100,000P')">🛒 매점 포인트 안내</div>
            </div>
        </aside>

        <main id="main-content">
            <div class="list-box">
                <div class="list-header" id="list-title">...</div>
                <div id="list-container"></div>
            </div>
        </main>

        <aside>
            <div class="submit-form">
                <div style="font-weight: bold; margin-bottom: 20px; color: var(--accent-pink);">RECORD SUBMIT</div>
                <div class="form-group">
                    <label>Level Name</label>
                    <input type="text" id="levelName" placeholder="예: Bloodbath">
                </div>
                <div class="form-group">
                    <label>Progress (%)</label>
                    <input type="number" id="percent" placeholder="100">
                </div>
                <div class="form-group">
                    <label>Video Link</label>
                    <input type="url" id="videoLink" placeholder="YouTube Link">
                </div>
                <button class="submit-btn" onclick="submitRecord()">제출하기</button>
            </div>
        </aside>
    </div>
</div>

<!-- 토스트 메시지 -->
<div class="toast" id="toast"></div>

<script>
    // =========================================================
    // ★★★ 여기에 본인의 Google Cloud Console 클라이언트 ID 입력 ★★★
    // https://console.cloud.google.com → API 및 서비스 → 사용자 인증 정보
    // =========================================================
    const GOOGLE_CLIENT_ID = '305327483972-ehu6ico6qnb99ct58vjqrjjrfn2e7csm.apps.googleusercontent.com';

    let googleClient = null;
    let currentUser = null;

    // Google GSI 라이브러리 로드 완료 후 초기화
    window.addEventListener('load', () => {
        // 라이브러리가 비동기 로드되므로 약간 대기
        setTimeout(initGoogleLogin, 500);
    });

    function initGoogleLogin() {
        if (typeof google === 'undefined') {
            console.warn('Google GSI 라이브러리 미로드. 재시도 중...');
            setTimeout(initGoogleLogin, 500);
            return;
        }

        // OAuth2 팝업 클라이언트 초기화
        googleClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'openid email profile',
            callback: handleTokenResponse,
        });

        // One Tap (자동 로그인 시도) - 선택사항
        google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleIdToken,
            auto_select: false,
        });
    }

    // ── 버튼 클릭 → 팝업 로그인 ──
    function startGoogleLogin() {
        if (!googleClient) {
            showToast('⚠️ Google 로그인 초기화 중입니다. 잠시 후 다시 시도하세요.');
            return;
        }
        googleClient.requestAccessToken();
    }

    // ── Access Token 수신 후 사용자 정보 가져오기 ──
    async function handleTokenResponse(tokenResponse) {
        if (tokenResponse.error) {
            console.error('로그인 실패:', tokenResponse.error);
            return;
        }

        try {
            // Google People API로 프로필 정보 요청
            const res = await fetch(
                'https://www.googleapis.com/oauth2/v3/userinfo',
                { headers: { Authorization: `Bearer ${tokenResponse.access_token}` } }
            );
            const profile = await res.json();
            onLoginSuccess(profile, tokenResponse.access_token);
        } catch (e) {
            console.error('프로필 요청 실패:', e);
            showToast('❌ 사용자 정보를 불러오지 못했습니다.');
        }
    }

    // ── One Tap ID Token 방식 콜백 (credential = JWT) ──
    function handleIdToken(response) {
        // JWT 디코딩 (서버 검증 없이 프론트에서 파싱 — 테스트 용도)
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        onLoginSuccess(payload, null);
    }

    // ── 로그인 성공 공통 처리 ──
    function onLoginSuccess(profile, accessToken) {
        currentUser = profile;

        // 헤더 UI 전환
        document.getElementById('loginBtn').style.display = 'none';
        const userArea = document.getElementById('userArea');
        userArea.style.display = 'flex';
        document.getElementById('userPhoto').src = profile.picture;
        document.getElementById('userName').textContent = profile.name;

        showToast(`🎮 환영합니다, ${profile.name}님!`);
        console.log('로그인 성공:', profile);
    }

    // ── 로그아웃 ──
    function signOut() {
        if (typeof google !== 'undefined') {
            google.accounts.id.disableAutoSelect();
        }
        currentUser = null;

        document.getElementById('loginBtn').style.display = '';
        document.getElementById('userArea').style.display = 'none';
        document.getElementById('userPhoto').src = '';
        document.getElementById('userName').textContent = '';

        showToast('👋 로그아웃 되었습니다.');
    }

    // ── 토스트 알림 ──
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // =========================================================
    //  기존 리스트/폼 로직 (변경 없음)
    // =========================================================
    const GDDP_OFFLINE = {
        "beginner": [
            {name: "The Nightmare", author: "Jax", id: "13519"},
            {name: "The Lightning Road", author: "Timeless", id: "55520"},
            {name: "iSpyWithMyLittleEye", author: "Vion", id: "90158869"},
            {name: "Platinum Adventure", author: "JerryFive", id: "590442"}
        ],
        "bronze": [
            {name: "B", author: "Motleyorc", id: "34085027"},
            {name: "DeCode", author: "Rekedge", id: "2915527"},
            {name: "Death Moon", author: "FunnyGame", id: "8660411"}
        ],
        "silver": [
            {name: "Nine Circles", author: "Zobros", id: "4284013"},
            {name: "Jawbreaker", author: "ZenthicAlpha", id: "4381328"},
            {name: "Forsaken Neon", author: "Zobros", id: "4519782"}
        ],
        "gold": [
            {name: "Future Funk", author: "JonathanGD", id: "46543165"},
            {name: "Windy Landscape", author: "Woogi1411", id: "4684367"},
            {name: "Supersonic", author: "ZenthicAlpha", id: "4681320"}
        ]
    };

    const AREDL_OFFLINE = [
        {name: "Tidal Wave", publisher: "Onilink", rank: "#1"},
        {name: "Avernus", publisher: "Pockabest", rank: "#2"},
        {name: "Silent Clubstep", publisher: "Paqoe", rank: "#3"},
        {name: "Acheron", publisher: "Ryamu", rank: "#4"},
        {name: "Slaughterhouse", publisher: "Doggie", rank: "#5"},
        {name: "Keres", publisher: "ItzVortox", rank: "#6"},
        {name: "Abyss of Darkness", publisher: "Exen", rank: "#7"},
        {name: "Sakupen Circles", publisher: "Nick24", rank: "#8"},
        {name: "Firework", publisher: "Trick", rank: "#9"},
        {name: "Tartarus", publisher: "Riot", rank: "#10"}
    ];

    function loadAboutGD() {
        const container = document.getElementById('list-container');
        document.getElementById('list-title').innerText = "About Geometry Dash";
        container.innerHTML = `
            <div class="about-section">
                <img src="./gdbanner.png" alt="Geometry Dash Banner">
                <h2>1. 개요</h2>
                <p><strong>Geometry Dash</strong>는 RobTop이 제작한 리듬 플랫폼 게임입니다. 2013년 출시 이후 에디터 기능을 통해 무한한 커뮤니티 콘텐츠를 생성하고 있습니다.</p>
                <h2>2. 특징</h2>
                <ul>
                    <li><strong>One-Button:</strong> 단순한 조작으로 극한의 피지컬을 요구합니다.</li>
                    <li><strong>커스텀 레벨:</strong> 전 세계 유저들이 만든 수천만 개의 맵이 존재합니다.</li>
                </ul>
                <div style="background: #1a1a1a; padding: 20px; border-radius: 8px; margin-top: 30px; border: 1px solid var(--accent-pink);">
                    <h3 style="margin: 0; color: var(--accent-pink);">⚠️ 디미고 수칙</h3>
                    <p style="margin-top:10px; font-size: 0.9rem;">- 모든 기록은 유튜브 영상 증빙 필수.<br>- 핵 사용 적발 시 즉각 제명됩니다.</p>
                </div>
            </div>`;
    }

    function loadGDDPList() {
        const container = document.getElementById('list-container');
        document.getElementById('list-title').innerText = "GDDP (Offline List)";
        let html = '';
        const tiers = ['beginner', 'bronze', 'silver', 'gold'];
        tiers.forEach(tier => {
            const colors = {'beginner': '#5ec6ff', 'bronze': '#cd7f32', 'silver': '#c0c0c0', 'gold': '#ffd700'};
            html += `<div class="tier-divider" style="border-left: 5px solid ${colors[tier]}; color: ${colors[tier]}; font-size:0.8rem;">
                        <span>${tier.toUpperCase()} TIER</span>
                     </div>`;
            GDDP_OFFLINE[tier].forEach(level => {
                html += `
                    <div class="demon-item" onclick="window.open('https://youtube.com/results?search_query=GD+${level.name}', '_blank')">
                        <span class="rank" style="color:#555">ID: ${level.id}</span>
                        <div class="level-info">
                            <span class="name">${level.name}</span>
                            <span class="author">by ${level.author}</span>
                        </div>
                    </div>`;
            });
        });
        container.innerHTML = html;
    }

    function loadExtremeList() {
        const container = document.getElementById('list-container');
        document.getElementById('list-title').innerText = "AREDL Top 10 (Offline List)";
        let html = '';
        AREDL_OFFLINE.forEach(level => {
            html += `
                <div class="demon-item" onclick="window.open('https://youtube.com/results?search_query=GD+${level.name}', '_blank')">
                    <span class="rank" style="color: var(--accent-pink)">${level.rank}</span>
                    <div class="level-info">
                        <span class="name">${level.name}</span>
                        <span class="author">by ${level.publisher}</span>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }
    //제출
    async function submitRecord() {
    if (!currentUser) {
        showToast('⚠️ 기록 제출은 로그인 후 가능합니다!');
        return;
    }

    const name = document.getElementById('levelName').value;
    const percent = document.getElementById('percent').value;
    const video = document.getElementById('videoLink').value;
    const status = document.getElementById('status').value;

    if (!name) { showToast('레벨 이름을 입력해주세요!'); return; }

    try {
        const { collection, addDoc, serverTimestamp } = window.firestoreLib;

        await addDoc(collection(window.db, 'records'), {
            levelName: name,
            percent: Number(percent),
            videoLink: video,
            status: status,                  // ← 추가
            userName: currentUser.name,
            userEmail: currentUser.email,
            userPhoto: currentUser.picture,
            createdAt: serverTimestamp()
        });

        showToast(`✅ ${name} 기록이 제출되었습니다!`);
        document.getElementById('levelName').value = '';
        document.getElementById('percent').value = '';
        document.getElementById('videoLink').value = '';
        document.getElementById('status').value = 'pending';

    } catch (e) {
        console.error(e);
        showToast('❌ 제출 실패. 콘솔을 확인하세요.');
    }
}
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBu6-HlFlzwTyxMYr85TMH71VS70nfB7OQ",
    authDomain: "dimigo-gd-forum.firebaseapp.com",
    projectId: "dimigo-gd-forum",
    storageBucket: "dimigo-gd-forum.firebasestorage.app",
    messagingSenderId: "41583507504",
    appId: "1:41583507504:web:af462f8cc4e0cb91afd5f5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── 전역으로 노출 (기존 일반 script에서 사용하기 위해) ──
  window.db = db;
  window.firestoreLib = { collection, addDoc, getDocs, query, orderBy, serverTimestamp };
</script>
</body>
</html>
